# SilvaEngine Gateway — Route Manifest (master)
#
# Each module points its dispatch routes at a core dispatch function
# (e.g. "package.module:dispatch_graphql"). The gateway resolves it
# via importlib and wraps it with the appropriate handler factory.
#
# handler_type: graphql | rest | background | task_status | sse | websocket
# dispatch: "package.module:function_name"
#
# Paths carry only {endpoint_id}; the tenant partition id is supplied by the
# "Part-Id" request header. The gateway builds partition_key = "{endpoint_id}#{Part-Id}".
#
# config_class: "package.module:ClassName" — auto-initialize at startup
# config_init_style: "dict" (Config.initialize(logger, setting))
#                    "kwargs" (Config.initialize(logger, **setting))
#
# on_shutdown: "package.module:function" — called during lifespan shutdown
# sse_manager: "package.module:instance" — SSE manager for handler_type: sse
# exception_handlers:
#   - exception_class: "package.module:ExceptionClass"
#     status_code: 401
#
# Splitting modules across child files:
# Each entry below pulls in a per-module fragment from routes/<module>.yaml.
# Child paths are relative to this file. A child may contain either a single
# module map (most common) or a YAML list of module maps (for grouping).
# Add a new module by creating routes/<module>.yaml and adding a !include
# line here.

modules:
  # ── Knowledge Graph Engine ────────────────────────────────────────────
  - !include routes/knowledge_graph_engine.yaml

  # ── AI Marketing Engine ───────────────────────────────────────────────
  - !include routes/ai_marketing_engine.yaml

  # ── RFQ Engine ────────────────────────────────────────────────────────
  - !include routes/rfq_engine.yaml

  # ── MCP Daemon Engine ────────────────────────────────────────────────
  - !include routes/mcp_daemon_engine.yaml

  # ── Client Engine ────────────────────────────────────────────────────
  - !include routes/client_engine.yaml

  # ── Setting Core Engine ──────────────────────────────────────────────
  - !include routes/setting_core_engine.yaml

  # ── AI Coordination Engine ───────────────────────────────────────────
  - !include routes/ai_coordination_engine.yaml

  # ── AI Agent Core Engine ─────────────────────────────────────────────
  - !include routes/ai_agent_core_engine.yaml

  # ── A2A Daemon Engine ────────────────────────────────────────────────
  - !include routes/a2a_daemon_engine.yaml