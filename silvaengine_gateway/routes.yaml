# SilvaEngine Gateway — Route Manifest
#
# Each module points its dispatch routes at a core dispatch function
# (e.g. "package.module:dispatch_graphql"). The gateway resolves it
# via importlib and wraps it with the appropriate handler factory.
#
# handler_type: graphql | rest | background | task_status
# dispatch: "package.module:function_name"
#
# config_class: "package.module:ClassName" — auto-initialize at startup
# config_init_style: "dict" (Config.initialize(logger, setting))
#                    "kwargs" (Config.initialize(logger, **setting))

modules:
  # ── Knowledge Graph Engine ────────────────────────────────────────────
  - name: knowledge_graph_engine
    package: knowledge_graph_engine
    transport: graphql
    config_class: "knowledge_graph_engine.handlers.config:Config"
    config_init_style: dict
    routes:
      - path: "/{endpoint_id}/{part_id}/knowledge_graph_graphql"
        handler_type: graphql
        dispatch: "knowledge_graph_engine.main:dispatch_graphql"
        methods: ["POST"]
        auth: true

      - path: "/{endpoint_id}/{part_id}/extract"
        handler_type: background
        dispatch: "knowledge_graph_engine.main:dispatch_extract"
        methods: ["POST"]
        auth: true

      - path: "/{endpoint_id}/{part_id}/extract/status/{task_id}"
        handler_type: task_status
        methods: ["GET"]
        auth: true

  # ── AI RFQ Engine ────────────────────────────────────────────────────
  - name: ai_rfq_engine
    package: ai_rfq_engine
    transport: graphql
    config_class: "ai_rfq_engine.handlers.config:Config"
    config_init_style: dict
    routes:
      - path: "/{endpoint_id}/{part_id}/ai_rfq_graphql"
        handler_type: graphql
        dispatch: "ai_rfq_engine.main:dispatch_graphql"
        methods: ["POST"]
        auth: true